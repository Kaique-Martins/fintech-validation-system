name: Trigger Render Deploy for Backend

on:
  push:
    branches: [ entrega ]

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Manual Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing Render secrets. Please add RENDER_API_KEY and RENDER_SERVICE_ID to repository secrets.";
            exit 1;
          fi
          echo "Triggering Render deploy for service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}'
